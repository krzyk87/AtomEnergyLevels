# ===========================================================================
# Preprocessing / feature-analysis RUN MANIFEST
# ===========================================================================
# Used by feature engineering (preprocess/preprocess_atomic.py) and feature
# analysis (preprocess/analyze_features.py). These steps run a priori, separately
# from training, and may cover many species at once.
#
# Per-element PHYSICAL CONSTANTS (Z, A, ionization energy, max_valence, zeta_3d)
# are NOT stored here — they live in one master table, `constants_file`
# (data/element_constants.xlsx, loaded by element_data.py), keyed by species.
# This file only lists WHICH species to process and WHERE their raw inputs are.
#
# Training (config_atomic.yaml) consumes the produced
# data/<El>_features_rich_<source>.xlsx files; it does not read this file.
#
# Run examples:
#   python preprocess/preprocess_atomic.py --config config_preprocess.yaml
#   python preprocess/preprocess_atomic.py --config config_preprocess.yaml --elements Co --source nist
#   python preprocess/analyze_features.py  --config config_preprocess.yaml --elements Li Na K Rb Cs Fr
# ===========================================================================

source: kurucz                       # active raw source (nist | kurucz); --source overrides
data_dir: data                       # where rich xlsx are written / read
report_dir: preprocess/reports       # where analyze_features.py writes its reports
constants_file: data/element_constants.xlsx   # master per-species constants table

# Global fallbacks merged into every element entry.
defaults:
  inverse_target_scale: 100000.0     # A in Inverse_Binding_Energy = A / binding

# Run manifest. Each entry names a species (element + ion stage, e.g. "Co I") and
# the raw input file per source. Physical constants are looked up from
# constants_file by species; add a constant inline here only to OVERRIDE the table.
elements:
  # --- Transition metal (rich xlsx already generated) --------------------
  - species: "Co I"
    input_files:
      kurucz: data/kurucz/Co_raw.xlsx
      nist:   data/nist/Co_i.csv

  # --- Alkali atoms (analysed from their existing {El}_features.csv) ------
  - species: "Li I"
    input_files: { nist: data/nist/Li_i.csv }
  - species: "Na I"
    input_files: { nist: data/nist/Na_i.csv }
  - species: "K I"
    input_files: { nist: data/nist/K_i.csv }
  - species: "Rb I"
    input_files: { nist: data/nist/Rb_i.csv }
  - species: "Cs I"
    input_files: { nist: data/nist/Cs_i.csv }
  - species: "Fr I"
    input_files: { nist: data/nist/Fr_i.csv }
