# Standalone feature-engineering step (preprocess_atomic.py).
# Reads a raw Kurucz/Cowan level file and writes a rich feature XLSX containing
# ALL computed features. AtomicDataset.py is intended to later just load this
# file and select columns by name instead of recomputing features on-the-fly.
preprocessing:
  input_file: "data/kurucz/Co_kurucz_raw.xlsx"  # raw level file (xlsx or csv)
  output_file: "data/Co_features_rich.xlsx"     # rich feature workbook to write
  element: "Co"
  Z: 27
  A: 59
  ionization_energy: 63564.0  # Co I ionization energy in cm^-1
  max_valence: 9              # max valence electrons encoded as (n, l) slots
  zeta_3d: 515.0             # Co I 3d spin-orbit coupling constant (cm^-1)

general:
  epochs: 30000                   # Number of training epochs
  optimizer: Adam               # Optimizer: Adam / SGD / RMSprop
  lr: 0.0005                     # Learning rate
  weight_decay: 0.0001          # L2 regularization (weight decay)
  batch_size: 16                # Batch size for training
  num_workers: 0                # Number of CPU workers for data loading
  random_seed: 42               # Random seed for reproducibility
  patience: 1000                  # Early stopping patience (epochs)
  device: cuda                  # Device: cuda / cpu

model:
  architecture: dense_nn        # Model type: dense_nn / baseline_ml
  hidden_layers: [128, 64, 32]  # Hidden layer sizes for dense NN     # 128, 64, 32
  dropout: 0.0                  # Dropout rate (0.0 to disable)
  activation: elu              # Activation function: relu / leaky_relu / elu
  use_batch_norm: false          # Whether to use batch normalization
  
  # Baseline ML models (for comparison)
  baseline_model: random_forest  # Options: linear_reg / random_forest / xgboost / gradient_boosting

dataset:
  # === Data source: pre-computed rich feature file (output of preprocess_atomic.py) ===
  rich_feature_file: "data/Co_features_rich.xlsx"

  # For multi-element training (future): list xlsx files per element.
  # The Element column is already baked into each xlsx by preprocess_atomic.py.
  # rich_feature_files:
  #   - "data/Co_features_rich.xlsx"
  #   - "data/Ni_features_rich.xlsx"

  # Target column - pick ONE (must exist in the xlsx).
  # Options: "OBS.LEVEL" / "Binding_Energy_cm-1" /
  #          "Log_Binding_Energy_cm-1" / "Inverse_Binding_Energy_cm-1"
  target_feature: "OBS.LEVEL"

  # Split file (train/val/test indices). Used directly when set.
  split_file: "data/dataset_split_indices_Co.json"

  # === Feature group toggles ===
  # Each group maps to a fixed set of columns in the rich xlsx (see FEATURE_GROUPS
  # in AtomicDataset.py). Set true to include that group as model inputs.
  feature_groups:
    valence_slots: true          # val_e1_n..val_e9_l (outermost-first)
    orbital_occupancies: false   # raw 1s..6p counts
    quantum_numbers: true        # result_S, result_L, J, parity_computed, term_known
    component_terms: true        # comp1_S..subres_L, n_components, has_subresultant
    angular_momentum: true       # J_sq, L_sq, S_sq, lande_so_term
    d_electron: true             # n_3d, d_holes, d_from_half, is_half_filled
    screening: true              # Z_eff, Z_eff_sq
    spin_orbit: true             # zeta_3d, E_so_estimate
    rydberg: false               # n_star, rydberg_prediction, one_over_nstar_sq
    gj_features: false            # calc_gj, lande_g_theoretical, has_lande_theoretical # only valid when multitask_gj: true
    eigenvalue: false             # EIGENVALUE, delta_e_theory
    atomic_constants: false      # Z, A, proton_number, neutron_number (multi-element only)
    valence_summary: true        # valence_electrons, total_electrons, max_principal_n

  # Fine-grained control within groups
  force_include_features: []     # Always add these column names
  force_exclude_features: []     # Always remove these column names

  # Drop columns with zero variance in the TRAIN set (checked on train indices only)
  drop_zero_variance_features: true

  # === Data normalization ===
  normalize_features: true      # Standardize features (zero mean, unit variance)
  normalize_target: false       # Standardize target variable

  # === Sample weighting for imbalanced energy distributions ===
  use_sample_weights: false
  weight_strategy: 'energy_bins'  # energy_bins / distance_to_ground / kde
  n_energy_bins: 10               # Number of bins for energy_bins strategy

  # === Data splitting ===
  split:
    train: 0.6
    val: 0.2
    test: 0.2
  stratify_energy_bins: 10   # quantile bins per element; 0 = element-only stratification

  # === Missing values ===
  drop_missing: false           # Drop rows with missing values
  fill_missing_value: 0.0       # Value to fill missing data (if not dropping)

  # === Retained for utils.py naming/inspection (NOT used for data loading) ===
  # _get_elements_str / get_model_name_from_config / save_dataset_to_xlsx read these.
  elements: ['Co']
  dataset_source: 'kurucz'
  data_dir: "data"
  max_valence_electrons: 9

training:
  criterion: SmoothL1                # Loss function: MSE / MAE / Huber
  use_focal_loss: false
  gradient_clip: 0.0            # Gradient clipping value (0.0 to disable)

  # Multi-task learning: predict energy AND experimental Landé g-factor simultaneously
  multitask_gj: true          # Enable multi-task learning (energy + gJ outputs)
  gj_target_mode: 'residual'  # gJ prediction target:
                               #   'raw'      → predict obs_gj directly
                               #   'residual' → predict obs_minus_calc_gj (obs_gj − calc_gj)
                               # Residual mode is preferred: the Cowan code already captures
                               # most of the gJ variance, so the ML head learns a small correction.
  multitask_alpha: 0.9         # Weight for energy loss; (1 - alpha) goes to gJ loss
  gj_criterion: MSE            # Loss function for the gJ head: MSE / MAE / Huber
  lr_scheduler: None  # LR scheduler: ReduceLROnPlateau / StepLR / None
  lr_scheduler_params:
    factor: 0.5                 # Multiply LR by this factor when reducing
    patience: 100                # Epochs to wait before reducing LR
    min_lr: 0.00001             # Minimum learning rate
  debug_multitask: false

permutation_importance:
  n_repeats: 30
  random_seed: 42
  output_dir: null  # if null, uses the same directory as the model checkpoint

logging:
  use_wandb: false              # Enable Weights & Biases logging
  wandb_project: "atomic-energy-prediction"
  wandb_entity: null            # Your W&B username (null = default)
  log_interval: 100              # Log metrics every N epochs
  save_dir: "saved_models"      # Directory to save model checkpoints
  save_best_only: true          # Only save the best model (by val loss)
